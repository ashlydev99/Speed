name: Android CI Signed

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-signed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download and setup Gradle
        run: |
          # Definir versión de Gradle
          GRADLE_VERSION=8.5
          
          # Descargar Gradle
          echo "Downloading Gradle $GRADLE_VERSION..."
          wget https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
          
          # Extraer Gradle
          echo "Extracting Gradle..."
          unzip -q gradle-${GRADLE_VERSION}-bin.zip
          
          # Crear estructura de gradle wrapper
          echo "Setting up Gradle wrapper..."
          mkdir -p gradle/wrapper
          
          # Copiar el wrapper JAR desde la instalación de Gradle
          cp gradle-${GRADLE_VERSION}/lib/plugins/gradle-wrapper-${GRADLE_VERSION}.jar gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          cp gradle-${GRADLE_VERSION}/lib/gradle-wrapper-${GRADLE_VERSION}.jar gradle/wrapper/gradle-wrapper.jar
          
          # Crear archivo de propiedades del wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << EOF
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\\://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # Crear el script gradlew para Linux/Mac
          cat > gradlew << 'EOF'
          #!/bin/sh
          #
          # Copyright © 2015-2021 the original authors.
          #
          # Licensed under the Apache License, Version 2.0 (the "License");
          # you may not use this file except in compliance with the License.
          # You may obtain a copy of the License at
          #
          #      https://www.apache.org/licenses/LICENSE-2.0
          #
          # Unless required by applicable law or agreed to in writing, software
          # distributed under the License is distributed on an "AS IS" BASIS,
          # WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
          # See the License for the specific language governing permissions and
          # limitations under the License.
          #

          ##############################################################################
          #
          #   Gradle start up script for POSIX generated by Gradle.
          #
          #   Important for running:
          #
          #   (1) You need a POSIX-compliant shell to run this script. If your /bin/sh is
          #       noncompliant, but you have some other compliant shell such as ksh or
          #       bash, then run 'sh' with that shell as the first argument, like:
          #           sh -c "GRADLE_HOME=/path/to/gradle bash gradlew"
          #       or you can set the 'gradle' property in gradle.properties to point to a
          #       compliant shell.
          #
          #   (2) This script attempts to add permissions for executing the wrapper jar.
          #       Because Android Gradle creates an empty wrapper jar without execute
          #       permissions, we need to add them manually.
          #
          ##############################################################################

          # Add execute permission to wrapper jar if needed
          if [ -f gradle/wrapper/gradle-wrapper.jar ]; then
              chmod +x gradle/wrapper/gradle-wrapper.jar
          fi

          # Use the Gradle installation if available
          if [ -n "$GRADLE_HOME" ] && [ -x "$GRADLE_HOME/bin/gradle" ]; then
              exec "$GRADLE_HOME/bin/gradle" "$@"
          else
              # Fallback to the wrapper jar
              exec java -jar gradle/wrapper/gradle-wrapper.jar "$@"
          fi
          EOF
          
          # Crear gradlew.bat para Windows
          cat > gradlew.bat << 'EOF'
          @rem
          @rem Copyright 2015 the original author or authors.
          @rem
          @rem Licensed under the Apache License, Version 2.0 (the "License");
          @rem you may not use this file except in compliance with the License.
          @rem You may obtain a copy of the License at
          @rem
          @rem      https://www.apache.org/licenses/LICENSE-2.0
          @rem
          @rem Unless required by applicable law or agreed to in writing, software
          @rem distributed under the License is distributed on an "AS IS" BASIS,
          @rem WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
          @rem See the License for the specific language governing permissions and
          @rem limitations under the License.
          @rem

          @if "%DEBUG%"=="" @echo off
          @rem ##########################################################################
          @rem
          @rem  Gradle startup script for Windows
          @rem
          @rem ##########################################################################

          @rem Set local scope for the variables with windows NT shell
          if "%OS%"=="Windows_NT" setlocal

          set DIRNAME=%~dp0
          if "%DIRNAME%"=="" set DIRNAME=.
          @rem This is normally unused
          set APP_BASE_NAME=%~n0
          set APP_HOME=%DIRNAME%

          @rem Resolve any "." and ".." in APP_HOME to make it shorter.
          for %%i in ("%APP_HOME%") do set APP_HOME=%%~fi

          @rem Add default JVM options here. You can also use JAVA_OPTS and GRADLE_OPTS to pass JVM options to this script.
          set DEFAULT_JVM_OPTS="-Xmx64m" "-Xms64m"

          @rem Find java.exe
          if defined JAVA_HOME goto findJavaFromJavaHome

          set JAVA_EXE=java.exe
          %JAVA_EXE% -version >NUL 2>&1
          if %ERRORLEVEL% equ 0 goto execute

          echo.
          echo ERROR: JAVA_HOME is not set and no 'java' command could be found in your PATH.
          echo.
          echo Please set the JAVA_HOME variable in your environment to match the
          echo location of your Java installation.

          goto fail

          :findJavaFromJavaHome
          set JAVA_HOME=%JAVA_HOME:"=%
          set JAVA_EXE=%JAVA_HOME%/bin/java.exe

          if exist "%JAVA_EXE%" goto execute

          echo.
          echo ERROR: JAVA_HOME is set to an invalid directory: %JAVA_HOME%
          echo.
          echo Please set the JAVA_HOME variable in your environment to match the
          echo location of your Java installation.

          goto fail

          :execute
          @rem Setup the command line

          set CLASSPATH=%APP_HOME%\gradle\wrapper\gradle-wrapper.jar

          @rem Execute Gradle
          "%JAVA_EXE%" %DEFAULT_JVM_OPTS% %JAVA_OPTS% %GRADLE_OPTS% "-Dorg.gradle.appname=%APP_BASE_NAME%" -classpath "%CLASSPATH%" org.gradle.wrapper.GradleWrapperMain %*
          if %ERRORLEVEL% neq 0 goto fail
          :fail
          @rem Return with code 1
          exit /B 1
          EOF
          
          # Dar permisos de ejecución a gradlew
          chmod +x gradlew
          
          # Limpiar archivos temporales
          rm gradle-${GRADLE_VERSION}-bin.zip
          
          echo "Gradle setup completed successfully!"
          echo "Files created:"
          ls -la gradlew gradle/wrapper/
          
          # Verificar que todo funciona
          ./gradlew --version

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode keystore from secret
        shell: bash
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Release APK (signed)
        env:
          SIGNING_STORE_FILE: keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:clean :app:assembleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Speed-release
          path: app/build/outputs/apk/release/*.apk

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Speed-debug
          path: app/build/outputs/apk/debug/*.apk